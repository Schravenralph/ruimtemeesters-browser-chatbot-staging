# OpenWebUI persona seeding manifest.
# Single source of truth — see ADR-0018.
# Applied by `scripts/seed_personas.py`.
#
# Sections (in execution order):
#   connection         — LiteLLM OpenAI-compat connection + default model + disabled providers
#   filters            — OpenWebUI Function rows (type=filter), source files referenced by path
#   legacy_persona_ids — Persona Model rows to delete on each run (retired ids)
#   personas           — The three persona Model rows (ADR-0011 canon)
#   prompts            — Slash-command prompt catalog

connection:
  base_urls:
    - http://litellm:4000/v1
  # Bare LiteLLM model_name values — must match `model_name` keys in litellm/config.yaml.
  default_model: RO-Assistent
  # Per-provider disables applied via /api/v1/configs/import.
  disable:
    - ollama.enable
    - evaluation.arena.enable

filters:
  - id: bopa_session_context
    name: BOPA Session Context
    source_path: rm-tools/filters/bopa_session_context.py
    needs_memory_token: true
    description: >-
      Inlet filter that injects the user's most-recent active BOPA session
      into the system prompt. Read-only context priming via rm-memory MCP.
      No-op when rm-memory is unreachable or the user has no active sessions.

  - id: memory_recall_context
    name: Memory Recall Context
    source_path: rm-tools/filters/memory_recall_context.py
    needs_memory_token: true
    description: >-
      Inlet filter that calls recall_memory with the user's latest message
      and injects matching memory descriptions into the system prompt.
      Read-only, fail-open. No-op for queries shorter than 4 chars or when
      no memories match.

  - id: memory_save_prompt
    name: Memory Save Prompt
    source_path: rm-tools/filters/memory_save_prompt.py
    description: >-
      Inlet filter that injects a one-shot instruction telling the assistant
      to ask the user about saving when conversation context crosses a
      configured threshold (default 100k / 250k / 500k / 1M tokens).
      No outbound RPCs; per-(user, chat) in-memory state.

  - id: skills_context
    name: Skills Context
    source_path: rm-tools/filters/skills_context.py
    needs_skills_token: true
    description: >-
      Inlet filter that fetches the active persona's mandatory skills from
      rm-skills (http://rm-skills:4101) at chat start and injects each body
      as a <skill name='...'> block in the system prompt. Read-only,
      fail-open. Cached per (persona, user_id) for 60s.

  - id: citation_links
    name: Citation Links
    source_path: rm-tools/filters/citation_links.py
    description: >-
      Outlet filter that turns bare ECLI references and Databank `doc_id: …`
      mentions in the assistant's response into clickable markdown links.
      Pure text transform — no outbound RPCs, no caching. Idempotent against
      already-linked occurrences.

# Persona Model rows we no longer want around. Cleared at the start of the
# persona-seeding phase so they don't linger in the dropdown after a rename.
# The `rm-*` ids were created by the retired rm-tools/register_assistants.py
# (a parallel persona track with an unreachable Gemini base model). Any
# environment that ran the old script still has those rows; this cleanup
# removes them on next seed.
legacy_persona_ids:
  - RO-Bot
  - JURA
  - Schets
  - Meester
  - rm-ro-assistent
  - rm-juridisch-assistent
  - rm-commercieel-assistent

