      - search_documents
      - get_document
      - classify_information_request
      - start_beleidsscan
      - beleidsscan_query
      - get_analysis_detail
      - analyze_question
      - theme_profile_for_gemeente
      - compare_gemeenten_on_theme
      - rules_by_gemeente_and_theme
      - list_document_library_filters
      - list_municipalities
      - get_databank_stats
      - browse_knowledge_graph
      - get_entity
      - search_raadsinformatie
