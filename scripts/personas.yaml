      - sample_spatial_layer_at_point
      - sample_bopa_constraints_at_point
      - bopa_*
      - list_bopa_layers
      - activities_at_point
      - evaluate_rules
      - decision
      - ruimtelijke_toets
      - applicability
      - applicability_consolidated
      - compliance_scan
      - get_compliance_*
      - get_building_data
      - search_artikelen
      - get_artikel
      - get_artikel_history
      - get_regeling_bekendmakingen
      - list_activiteiten
      - list_available_checks
      - list_catalog_layers
      - list_onderbouwing_sections
      - list_parkeernorm_functies
      - list_regelingen
      - get_parkeernorm
      - solar_*
      - energy_area_balance
      - get_onderbouwing_section
      - query_spatial_rules
      - search_pdok
      - get_air_quality
      - get_weather
