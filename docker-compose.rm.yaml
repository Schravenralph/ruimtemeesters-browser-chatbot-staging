# Ruimtemeesters Browser Chatbot — Docker Compose
#
# Usage:
#   docker compose -f docker-compose.rm.yaml up -d --build
#
# Or set COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.rm.yaml
#
# GPU support: add docker-compose.gpu.yaml as override:
#   docker compose -f docker-compose.rm.yaml -f docker-compose.gpu.yaml up -d --build

services:
  ollama:
    image: intelanalytics/ipex-llm-inference-cpp-xpu:latest
    container_name: rm-ollama
    volumes:
      - ollama-data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "993"  # render group GID for /dev/dri/renderD128
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_GPU=999
      - OLLAMA_INTEL_GPU=true
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    entrypoint: >
      bash -c "export PATH=/usr/local/lib/python3.11/dist-packages/bigdl/cpp/libs/ollama:$$PATH
      && source /opt/intel/oneapi/setvars.sh --force 2>/dev/null
      && ollama serve"
    tty: true
    restart: unless-stopped
    networks:
      - rm-internal

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rm-chatbot
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      ollama:
        condition: service_started
      chatbot-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${OPEN_WEBUI_PORT:-3333}:8080"
    environment:
      # --- Core ---
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rmchatbot}:${POSTGRES_PASSWORD:-rmchatbot}@chatbot-db:5432/${POSTGRES_DB:-rmchatbot}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # --- Branding ---
      - WEBUI_NAME=${WEBUI_NAME:-Ruimtemeesters AI}
      - WEBUI_FAVICON_URL=/brand-assets/icon-blue.png
      # PWA manifest override — RM colors + icon. Path form (leading "/") makes the backend
      # read it from the frontend build dir directly; avoids self-HTTP deadlock.
      - EXTERNAL_PWA_MANIFEST_URL=/brand-assets/rm-manifest.json
      # Non-dismissible trust banner on every session.
      - 'WEBUI_BANNERS=[{"id":"rm-trust","type":"info","title":"","content":"Besloten werkomgeving voor Ruimtemeesters · Data wordt niet gedeeld met LLM-providers","dismissible":false,"timestamp":1713398400}]'
      # Default model — Gemini 2.5 Flash Lite (fast, cheap, verified).
      - DEFAULT_MODELS=${DEFAULT_MODELS:-gemini.gemini-2.5-flash-lite}
      # Internal tool — disable community share (data-leak path).
      - ENABLE_COMMUNITY_SHARING=${ENABLE_COMMUNITY_SHARING:-false}
      # --- URL (needed behind reverse proxy for correct OAuth redirects) ---
      - WEBUI_URL=${WEBUI_URL:-}
      # --- Cookie security (set true for HTTPS production) ---
      - WEBUI_AUTH_COOKIE_SAME_SITE=${WEBUI_AUTH_COOKIE_SAME_SITE:-lax}
      - WEBUI_AUTH_COOKIE_SECURE=${WEBUI_AUTH_COOKIE_SECURE:-false}
      # --- Auth (Clerk OIDC) ---
      - ENABLE_OAUTH_SIGNUP=${ENABLE_OAUTH_SIGNUP:-true}
      # Clerk auth IS the auth: a verified Clerk OIDC token means the user is in.
      # Override OpenWebUI's "pending" default so first-time OIDC signups land active,
      # matching the trust model in projectbeheer / other RM apps.
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}
      - OPENID_PROVIDER_URL=${CLERK_OIDC_DISCOVERY_URL:-}
      - OAUTH_CLIENT_ID=${CLERK_OAUTH_CLIENT_ID:-}
      - OAUTH_CLIENT_SECRET=${CLERK_OAUTH_CLIENT_SECRET:-}
      - OAUTH_PROVIDER_NAME=${OAUTH_PROVIDER_NAME:-Clerk}
      - OAUTH_SCOPES=${OAUTH_SCOPES:-openid profile email}
      - OAUTH_USERNAME_CLAIM=${OAUTH_USERNAME_CLAIM:-email}
      - OAUTH_EMAIL_CLAIM=${OAUTH_EMAIL_CLAIM:-email}
      # --- Auth form ---
      - ENABLE_LOGIN_FORM=${ENABLE_LOGIN_FORM:-false}
      - ENABLE_PASSWORD_AUTH=${ENABLE_PASSWORD_AUTH:-false}
      # --- Clerk SSO (shared cookie) ---
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - CLERK_JWKS_URI=${CLERK_JWKS_URI:-https://clerk.datameesters.nl/.well-known/jwks.json}
      - CLERK_ISSUER=${CLERK_ISSUER:-https://clerk.datameesters.nl}
      # --- LLM Providers ---
      # Multi-endpoint OpenAI-compatible: OpenAI + Google Gemini (AI Studio) +
      # OpenRouter (gateway to Claude Opus 4.7, Llama, DeepSeek, and many more).
      # Order matches OPENAI_API_KEYS to OPENAI_API_BASE_URLS by position.
      # Per-endpoint curation (prefix_id, model_ids, tags) is NOT env-readable in OpenWebUI;
      # configure it under Admin Panel → Settings → Connections after first boot.
      - OPENAI_API_BASE_URLS=https://api.openai.com/v1;https://generativelanguage.googleapis.com/v1beta/openai;https://openrouter.ai/api/v1
      - OPENAI_API_KEYS=${OPENAI_API_KEY:-};${GEMINI_API_KEY:-};${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # --- Audit logging ---
      - AUDIT_LOG_LEVEL=${AUDIT_LOG_LEVEL:-REQUEST}
      - ENABLE_AUDIT_LOGS_FILE=true
      # Path segments AFTER the /api/(v1/)? prefix — env.py:875 lstrips "/" and audit.py
      # prepends ^/api(?:/v1)?/ when building the match regex. Full-form paths never match.
      - AUDIT_INCLUDED_PATHS=chat,tools,models,auths
      # --- MCP Tool Servers ---
      - 'TOOL_SERVER_CONNECTIONS=[{"type":"mcp","url":"http://rm-mcp-databank:3101/mcp","auth_type":"none","headers":{"X-API-Key":"${DATABANK_AUTH_TOKEN:-}"},"info":{"id":"rm-databank","name":"Ruimtemeesters Databank","description":"Policy documents, knowledge graph, beleidsscan"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-geoportaal:3102/mcp","auth_type":"none","headers":{"X-API-Key":"${GEOPORTAAL_API_KEY:-}"},"info":{"id":"rm-geoportaal","name":"Ruimtemeesters Geoportaal","description":"Spatial rules, air quality, weather, 3D buildings, PDOK"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-tsa:3103/mcp","auth_type":"none","headers":{"X-API-Key":"${TSA_API_KEY:-}"},"info":{"id":"rm-tsa","name":"Ruimtemeesters TSA","description":"Population forecasting with ML ensemble"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-dashboarding:3104/mcp","auth_type":"none","headers":{"X-API-Key":"${DASHBOARDING_API_KEY:-}"},"info":{"id":"rm-dashboarding","name":"Ruimtemeesters Dashboarding","description":"CBS/Primos demographic data and statistics"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-riens:3105/mcp","auth_type":"none","headers":{"X-API-Key":"${RIENS_API_KEY:-}"},"info":{"id":"rm-riens","name":"Ruimtemeesters Riens Sales Viewer","description":"Municipality contract status"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-sales-predictor:3106/mcp","auth_type":"none","headers":{"X-API-Key":"${SALES_PREDICTOR_API_KEY:-}"},"info":{"id":"rm-sales-predictor","name":"Ruimtemeesters Sales Predictor","description":"Sales forecasting with ML models"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-opdrachten:3107/mcp","auth_type":"none","headers":{"X-API-Key":"${OPDRACHTEN_API_KEY:-}"},"info":{"id":"rm-opdrachten","name":"Ruimtemeesters Opdrachten Scanner","description":"DAS/inhuur assignment pipeline"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-aggregator:3108/mcp","auth_type":"none","headers":{"X-API-Key":"${AGGREGATOR_API_KEY:-}"},"info":{"id":"rm-aggregator","name":"Ruimtemeesters Aggregator","description":"Cross-app context, documents, spatial, knowledge graph"},"config":{"enable":true}}]'
      # --- Telemetry off ---
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - rm-internal
      - rm-network

  chatbot-db:
    image: postgres:16-alpine
    container_name: rm-chatbot-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rmchatbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rmchatbot}
      - POSTGRES_DB=${POSTGRES_DB:-rmchatbot}
    volumes:
      - chatbot-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rmchatbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rm-internal

volumes:
  ollama-data:
  open-webui-data:
  chatbot-db-data:

networks:
  rm-internal:
    driver: bridge
  rm-network:
    external: true
    name: rm-network
