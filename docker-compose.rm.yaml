# Ruimtemeesters Browser Chatbot — Docker Compose
#
# Usage:
#   docker compose -f docker-compose.rm.yaml up -d --build
#
# Or set COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.rm.yaml
#
# GPU support: add docker-compose.gpu.yaml as override:
#   docker compose -f docker-compose.rm.yaml -f docker-compose.gpu.yaml up -d --build

services:
  ollama:
    image: intelanalytics/ipex-llm-inference-cpp-xpu:latest
    container_name: rm-ollama
    volumes:
      - ollama-data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - '993' # render group GID for /dev/dri/renderD128
    environment:
      # OLLAMA_HOST is used both as the serve-time bind address AND as the
      # CLI's connect target (e.g. `docker exec rm-ollama ollama list`).
      # We point the env at the docker DNS name `ollama:11434` so the CLI
      # works; the entrypoint then resolves it to the container's bridge
      # IP for the actual bind — that avoids 0.0.0.0 wildcard binds while
      # keeping ad-hoc CLI commands functional.
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_NUM_GPU=999
      - OLLAMA_INTEL_GPU=true
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    entrypoint: >
      bash -c "export PATH=/usr/local/lib/python3.11/dist-packages/bigdl/cpp/libs/ollama:$$PATH
      && source /opt/intel/oneapi/setvars.sh --force 2>/dev/null
      && IP=$$(hostname -i 2>/dev/null | awk '{print $$1}')
      && export OLLAMA_HOST=$${IP:-ollama}:11434
      && ollama serve"
    tty: true
    restart: unless-stopped
    networks:
      - rm-internal

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rm-chatbot
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      ollama:
        condition: service_started
      chatbot-db:
        condition: service_healthy
      # Post-cutover (ADR-0010): chat path goes through LiteLLM. Gating on
      # service_healthy avoids a window where the dropdown is empty / chat
      # 503s while LiteLLM is still finishing its prisma migration sweep
      # (~6 min on first boot). Subsequent boots are fast — see the litellm
      # service healthcheck below for the start_period budget.
      litellm:
        condition: service_healthy
    ports:
      - '127.0.0.1:${OPEN_WEBUI_PORT:-3333}:8080'
    environment:
      # --- Core ---
      - OLLAMA_BASE_URL=http://ollama:11434
      # End users see only the codenamed LiteLLM surface (Schets, Meester).
      # Hide every other model source from the dropdown:
      #   - Ollama: any locally pulled model (qwen, llama, etc.) would
      #     otherwise auto-discover into the picker.
      #   - Evaluation arena models: admin-created A/B comparison models.
      # PersistentConfig means env is read on first boot only — for the
      # cutover deploy the DB needs to be flipped via /api/v1/configs/import
      # (see scripts/seed-litellm-connection.sh which now also resets these).
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-False}
      - ENABLE_EVALUATION_ARENA_MODELS=${ENABLE_EVALUATION_ARENA_MODELS:-False}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rmchatbot}:${POSTGRES_PASSWORD:-rmchatbot}@chatbot-db:5432/${POSTGRES_DB:-rmchatbot}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # --- Branding ---
      - WEBUI_NAME=${WEBUI_NAME:-Ruimtemeesters AI Chatbot}
      - WEBUI_FAVICON_URL=/brand-assets/icon-blue.png
      # Default UI language for first-time visitors (no localStorage `locale`).
      # Returning users keep whatever they previously selected. Override via
      # the user-settings language picker.
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-nl-NL}
      # PWA manifest override — RM colors + icon. Path form (leading "/") makes the backend
      # read it from the frontend build dir directly; avoids self-HTTP deadlock.
      - EXTERNAL_PWA_MANIFEST_URL=/brand-assets/rm-manifest.json
      # Non-dismissible trust banner on every session.
      - 'WEBUI_BANNERS=[{"id":"rm-trust","type":"info","title":"","content":"Besloten werkomgeving voor Ruimtemeesters · Data wordt niet gedeeld met LLM-providers","dismissible":false,"timestamp":1713398400}]'
      # Default model — `RO-Assistent` (the RO-adviseur persona; see
      # litellm/config.yaml + the OWUI Model row seeded by
      # scripts/seed-litellm-connection.sh which carries the system prompt).
      # Most chatbot use is RO planning work, so RO-Assistent defaults;
      # users can flip to `Juridisch-Assistent` for juridische vraagstukken
      # or `Commercieel-Assistent` for tendering/sales/inhuur work.
      - DEFAULT_MODELS=${DEFAULT_MODELS:-RO-Assistent}
      # Internal tool — disable community share (data-leak path).
      - ENABLE_COMMUNITY_SHARING=${ENABLE_COMMUNITY_SHARING:-false}
      # --- URL (needed behind reverse proxy for correct OAuth redirects) ---
      - WEBUI_URL=${WEBUI_URL:-}
      # --- Cookie security (set true for HTTPS production) ---
      - WEBUI_AUTH_COOKIE_SAME_SITE=${WEBUI_AUTH_COOKIE_SAME_SITE:-lax}
      - WEBUI_AUTH_COOKIE_SECURE=${WEBUI_AUTH_COOKIE_SECURE:-false}
      # --- Auth (Clerk OIDC) ---
      - ENABLE_OAUTH_SIGNUP=${ENABLE_OAUTH_SIGNUP:-true}
      # Clerk auth IS the auth: a verified Clerk OIDC token means the user is in.
      # Override OpenWebUI's "pending" default so first-time OIDC signups land active,
      # matching the trust model in projectbeheer / other RM apps.
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}
      - OPENID_PROVIDER_URL=${CLERK_OIDC_DISCOVERY_URL:-}
      - OAUTH_CLIENT_ID=${CLERK_OAUTH_CLIENT_ID:-}
      - OAUTH_CLIENT_SECRET=${CLERK_OAUTH_CLIENT_SECRET:-}
      - OAUTH_PROVIDER_NAME=${OAUTH_PROVIDER_NAME:-Clerk}
      - OAUTH_SCOPES=${OAUTH_SCOPES:-openid profile email}
      - OAUTH_USERNAME_CLAIM=${OAUTH_USERNAME_CLAIM:-email}
      - OAUTH_EMAIL_CLAIM=${OAUTH_EMAIL_CLAIM:-email}
      # --- Auth form ---
      - ENABLE_LOGIN_FORM=${ENABLE_LOGIN_FORM:-false}
      - ENABLE_PASSWORD_AUTH=${ENABLE_PASSWORD_AUTH:-false}
      # --- Clerk SSO (shared cookie) ---
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - CLERK_JWKS_URI=${CLERK_JWKS_URI:-https://clerk.datameesters.nl/.well-known/jwks.json}
      - CLERK_ISSUER=${CLERK_ISSUER:-https://clerk.datameesters.nl}
      # --- LLM Providers (post-cutover, ADR-0010) ---
      # Single OpenAI-compatible endpoint pointing at the LiteLLM proxy. All
      # provider keys (OpenAI, Anthropic, Gemini, OpenRouter) live on the
      # `litellm` service below — never on the chatbot. OpenWebUI authenticates
      # against LiteLLM with LITELLM_MASTER_KEY.
      #
      # Model curation lives in litellm/config.yaml. Bare model_name strings
      # (no prefix_id) — see scripts/seed-litellm-connection.sh for the
      # admin-API call that overwrites stale DB Connection state during
      # cutover (PersistentConfig means env is read on first boot only).
      - OPENAI_API_BASE_URLS=http://litellm:4000/v1
      - OPENAI_API_KEYS=${LITELLM_MASTER_KEY:-}
      # All chatbot users are Clerk-verified (trusted internal). Without this,
      # non-admin users see zero models in the dropdown — LiteLLM-proxied
      # models have no `model` DB row, and the filter at utils/models.py:455
      # only shows unconfigured models to admins. Flip back to false once a
      # per-model access_grants story is in place.
      - BYPASS_MODEL_ACCESS_CONTROL=${BYPASS_MODEL_ACCESS_CONTROL:-true}
      # --- Audit logging ---
      - AUDIT_LOG_LEVEL=${AUDIT_LOG_LEVEL:-REQUEST}
      - ENABLE_AUDIT_LOGS_FILE=true
      # Path segments AFTER the /api/(v1/)? prefix — env.py:875 lstrips "/" and audit.py
      # prepends ^/api(?:/v1)?/ when building the match regex. Full-form paths never match.
      - AUDIT_INCLUDED_PATHS=chat,tools,models,auths
      # --- MCP Tool Servers ---
      # The TOOL_SERVER_CONNECTIONS entries below ship without
      # `config.access_grants`. Upstream OpenWebUI treats that as "admin-only"
      # (see has_connection_access in utils/access_control), which would hide
      # all 9 RM MCPs from every non-admin chatbot user. Flip the default to
      # "public-read for empty grants" so all Clerk-verified users see them
      # without us having to POST per-server grants (which would shadow the
      # env, see project_mcp_wiring_strategy memory).
      - TOOL_SERVERS_DEFAULT_PUBLIC=${TOOL_SERVERS_DEFAULT_PUBLIC:-true}
      - 'TOOL_SERVER_CONNECTIONS=[{"type":"mcp","url":"http://rm-mcp-databank:3101/mcp","auth_type":"none","headers":{"X-API-Key":"${DATABANK_AUTH_TOKEN:-}"},"info":{"id":"rm-databank","name":"Ruimtemeesters Databank","description":"Policy documents, knowledge graph, beleidsscan"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-geoportaal:3102/mcp","auth_type":"none","headers":{"X-API-Key":"${GEOPORTAAL_API_KEY:-}"},"info":{"id":"rm-geoportaal","name":"Ruimtemeesters Geoportaal","description":"Spatial rules, air quality, weather, 3D buildings, PDOK"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-tsa:3103/mcp","auth_type":"none","headers":{"X-API-Key":"${TSA_API_KEY:-}"},"info":{"id":"rm-tsa","name":"Ruimtemeesters TSA","description":"Population forecasting with ML ensemble"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-dashboarding:3104/mcp","auth_type":"none","headers":{"X-API-Key":"${DASHBOARDING_API_KEY:-}"},"info":{"id":"rm-dashboarding","name":"Ruimtemeesters Dashboarding","description":"CBS/Primos demographic data and statistics"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-riens:3105/mcp","auth_type":"none","headers":{"X-API-Key":"${RIENS_API_KEY:-}"},"info":{"id":"rm-riens","name":"Ruimtemeesters Riens Sales Viewer","description":"Municipality contract status"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-sales-predictor:3106/mcp","auth_type":"none","headers":{"X-API-Key":"${SALES_PREDICTOR_API_KEY:-}"},"info":{"id":"rm-sales-predictor","name":"Ruimtemeesters Sales Predictor","description":"Sales forecasting with ML models"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-opdrachten:3107/mcp","auth_type":"none","headers":{"X-API-Key":"${OPDRACHTEN_API_KEY:-}"},"info":{"id":"rm-opdrachten","name":"Ruimtemeesters Opdrachten Scanner","description":"DAS/inhuur assignment pipeline"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-aggregator:3108/mcp","auth_type":"none","headers":{"X-API-Key":"${AGGREGATOR_API_KEY:-}"},"info":{"id":"rm-aggregator","name":"Ruimtemeesters Aggregator","description":"Cross-app context, documents, spatial, knowledge graph"},"config":{"enable":true}},{"type":"mcp","url":"http://rm-mcp-memory:3200/mcp","auth_type":"none","headers":{"Authorization":"Bearer ${MEMORY_GATEWAY_TOKEN:-}"},"info":{"id":"rm-memory","name":"Ruimtemeesters Memory","description":"Persistent per-user memory: BOPA sessions, recall_memory, save_memory"},"config":{"enable":true}}]'
      # --- Per-user identity propagation to MCP servers ---
      # Memory server's `gateway`-named API key requires X-Forwarded-User to
      # scope memory per end user (otherwise all chatbot users would share one
      # bucket). FORWARD_USER_INFO_HEADER_USER_EMAIL renames the email header
      # OpenWebUI normally calls X-OpenWebUI-User-Email to X-Forwarded-User.
      - ENABLE_FORWARD_USER_INFO_HEADERS=${ENABLE_FORWARD_USER_INFO_HEADERS:-true}
      - FORWARD_USER_INFO_HEADER_USER_EMAIL=${FORWARD_USER_INFO_HEADER_USER_EMAIL:-X-Forwarded-User}
      # --- rm-memory admin BFF ---
      # Server-side admin token for /api/v1/admin/memory/stats (cross-user
      # aggregates). Distinct from MEMORY_GATEWAY_TOKEN which is per-user.
      # Leave blank to keep the admin endpoint offline (chatbot returns 503
      # with a clear "not configured" detail).
      - MEMORY_ADMIN_TOKEN=${MEMORY_ADMIN_TOKEN:-}
      # --- rm-memory user-facing BFF ---
      # The same gateway token is interpolated into TOOL_SERVER_CONNECTIONS
      # above for the LLM-tool path, but /api/v1/rm-memory/list reads it
      # from os.environ — needs an explicit export here so the BFF works in
      # the documented compose deployment.
      - MEMORY_GATEWAY_TOKEN=${MEMORY_GATEWAY_TOKEN:-}
      # MCP URL is hard-coded to the compose-internal hostname; override only
      # when running the chatbot backend outside the rm-internal network.
      - RM_MEMORY_MCP_URL=${RM_MEMORY_MCP_URL:-http://rm-mcp-memory:3200/mcp}
      # --- Telemetry off ---
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
      # --- Web search (RAG over the open web) ---
      # Default: duckduckgo (no API key). Upgrade by setting WEB_SEARCH_ENGINE=brave
      # plus BRAVE_SEARCH_API_KEY in .env — see .env.rm.example.
      # PersistentConfig: env wins only when the DB row is unset (fresh install).
      # For existing instances, flip via Admin → Settings → Web Search after restart.
      - ENABLE_WEB_SEARCH=${ENABLE_WEB_SEARCH:-True}
      - WEB_SEARCH_ENGINE=${WEB_SEARCH_ENGINE:-duckduckgo}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - rm-internal
      - rm-network

  chatbot-db:
    image: postgres:16-alpine
    container_name: rm-chatbot-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rmchatbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rmchatbot}
      - POSTGRES_DB=${POSTGRES_DB:-rmchatbot}
    volumes:
      - chatbot-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rmchatbot}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rm-internal

  # One-shot init: ensure the `litellm` database exists in chatbot-db.
  # LiteLLM uses prisma which generates "migration diffs" against the schema
  # it sees in its DATABASE_URL — when pointed at a database shared with
  # another app, those diffs DROP the foreign tables. Giving LiteLLM its own
  # logical database isolates the prisma footprint to a database it owns.
  # See ADR-0010 "Postmortem" section.
  litellm-db-init:
    image: postgres:16-alpine
    container_name: rm-litellm-db-init
    depends_on:
      chatbot-db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:-rmchatbot}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
    entrypoint: ['/bin/sh', '-c']
    command:
      # Two jobs in one shot:
      # 1. Refuse to proceed if LITELLM_MASTER_KEY is empty. LiteLLM's
      #    upstream master_key validation was removed in their PR #16453,
      #    so an empty key would otherwise produce a working but
      #    UNAUTHENTICATED proxy on rm-internal — every container on that
      #    network could call it and exfiltrate provider API keys.
      #    Failing the init container here gates the whole LiteLLM stack
      #    behind a real key (LiteLLM `depends_on: condition: service_completed_successfully`).
      # 2. Idempotently CREATE DATABASE litellm so prisma migrations stay
      #    isolated from OWUI's database (see ADR-0010 Postmortem).
      - >
        if [ -z "$$LITELLM_MASTER_KEY" ]; then
          echo "ERROR: LITELLM_MASTER_KEY is empty.";
          echo "Generate one with: openssl rand -hex 32";
          echo "Set it in .env (prefixed sk- so OpenWebUI accepts it).";
          exit 1;
        fi;
        psql -h chatbot-db -U ${POSTGRES_USER:-rmchatbot} -d postgres -tc
        "SELECT 1 FROM pg_database WHERE datname='litellm'" | grep -q 1 ||
        psql -h chatbot-db -U ${POSTGRES_USER:-rmchatbot} -d postgres -c
        "CREATE DATABASE litellm OWNER ${POSTGRES_USER:-rmchatbot}"
    restart: 'no'
    networks:
      - rm-internal

  # LiteLLM proxy (ADR-0010). Single OpenAI-compatible endpoint between
  # OpenWebUI and the actual providers. Cutover complete: rm-chatbot points
  # at http://litellm:4000/v1 with LITELLM_MASTER_KEY as its only key.
  # Internal-only (expose:, no ports:) per the never-publish-database rule.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: rm-litellm
    command: ['--config', '/app/config.yaml', '--port', '4000', '--num_workers', '2']
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      # `:-` (not `:?`) — fail-soft on missing key so a missing
      # LITELLM_MASTER_KEY only breaks the litellm service, not the whole
      # compose stack. LiteLLM itself refuses to start without master_key,
      # so the failure mode is a loud crashloop on rm-litellm while
      # rm-chatbot, rm-ollama, and rm-chatbot-db keep running.
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      # IMPORTANT: this MUST point at the dedicated `litellm` database, never
      # at the OWUI database (rmchatbot). LiteLLM's prisma migrations will
      # drop any non-LiteLLM tables it finds. See ADR-0010 "Postmortem".
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rmchatbot}:${POSTGRES_PASSWORD:-rmchatbot}@chatbot-db:5432/litellm
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    expose:
      - '4000'
    depends_on:
      chatbot-db:
        condition: service_healthy
      litellm-db-init:
        condition: service_completed_successfully
    healthcheck:
      # The litellm:main-stable image ships without curl/wget — use the
      # vendored python instead. urlopen returns a non-200 → urllib raises
      # → check fails. urllib.request.urlopen.status is the cleanest
      # one-liner that doesn't pull in any extra deps.
      test:
        [
          'CMD',
          'python3',
          '-c',
          'import urllib.request, sys; sys.exit(0 if urllib.request.urlopen("http://localhost:4000/health/liveliness", timeout=3).status == 200 else 1)'
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      # First boot runs ~116 prisma migrations against the shared
      # chatbot-db; takes 4–5 minutes. Subsequent boots are fast.
      start_period: 6m
    restart: unless-stopped
    networks:
      - rm-internal

volumes:
  ollama-data:
  open-webui-data:
  chatbot-db-data:

networks:
  rm-internal:
    driver: bridge
  rm-network:
    external: true
    name: rm-network
