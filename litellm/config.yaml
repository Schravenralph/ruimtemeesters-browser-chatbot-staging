# LiteLLM proxy config for Ruimtemeesters AI
#
# After cutover (ADR-0010 build order step 2), this is the single endpoint
# OpenWebUI talks to. All provider keys live here, not in OpenWebUI.
#
# Three RM personas, all backed by Claude Opus 4.7 — the persona difference
# (display name, description, system prompt) lives on the OpenWebUI Model
# row, not at this layer. LiteLLM only does the routing.
#
#   - `RO-Assistent`: ruimtelijke ordening (BOPA, omgevingsplannen).
#   - `Juridisch-Assistent`: juridische zaken (Omgevingswet, Awb, Wro,
#     jurisprudentie).
#   - `Commercieel-Assistent`: commercieel (tendering, aanbestedingen,
#     sales pipeline, opportunities per gemeente).
#
# Routing keys use hyphens (no spaces) for safe URL handling. Display
# names ("RO Assistent", "Juridisch Assistent", "Commercieel Assistent")
# are set on the OWUI Model rows by scripts/seed-litellm-connection.sh.
#
# No extended-thinking config here — all three run Opus in default mode
# (no `thinking` block) which is the cost-effective sweet spot. Per-model
# tuning (thinking budget, etc.) is a follow-up tracked in #79.

model_list:
  - model_name: RO-Assistent
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: Juridisch-Assistent
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: Commercieel-Assistent
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # Tolerate OpenAI-shaped requests against non-OpenAI providers.
  # OpenWebUI emits OpenAI-shaped chat completions; LiteLLM drops unsupported
  # params silently rather than 422-ing the request.
  drop_params: true

general_settings:
  # OpenWebUI authenticates against LiteLLM with this key (single key surface
  # post-cutover). Must be set in the environment; LiteLLM refuses to start
  # without one — preventing an accidental no-auth deploy.
  master_key: os.environ/LITELLM_MASTER_KEY

  # Spend tracking + virtual-key issuance live in postgres. Uses the
  # dedicated `litellm` database within the shared chatbot-db postgres
  # instance — created by the litellm-db-init compose sidecar. LiteLLM
  # auto-creates LiteLLM_* tables there on first boot.
  #
  # CRITICAL: this URL MUST point at a database LiteLLM owns exclusively.
  # Prisma's migration step issues a "migration diff" that drops any
  # non-LiteLLM tables it finds. See ADR-0010 "Postmortem" for the
  # 2026-05-09 incident this isolation prevents.
  database_url: os.environ/DATABASE_URL
