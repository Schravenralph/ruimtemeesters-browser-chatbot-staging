name: Frontend Build

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  build:
    name: 'Format & Build Frontend'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install --force

      - name: Format Frontend
        run: npm run format

      - name: Run i18next
        run: npm run i18n:parse

      - name: Check for Changes After Format
        run: git diff --exit-code

      - name: Build Frontend
        # The OWUI bundle is right at Node's default 4 GB heap ceiling
        # during `vite build`'s chunk-render phase — observed sporadic
        # "Ineffective mark-compacts near heap limit" OOMs on the
        # GitHub-hosted ubuntu-latest runner. Bumping the old-space
        # limit to 6 GB gives Vite room to finish without crashing.
        # The runner has 7 GB RAM so 6 GB is safe.
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  test-frontend:
    name: 'Frontend Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci --force

      - name: Run vitest
        run: npm run test:frontend
